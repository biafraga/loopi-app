<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="400" height="400">
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes blink-eye {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .body-group { animation: float 3s ease-in-out infinite; }
    .eye { animation: blink-eye 4s ease-in-out infinite; transform-origin: center; }
    .ring-dash { animation: spin-slow 12s linear infinite; transform-origin: 50px 52px; }
  </style>

  <g class="body-group">
    <!-- anel tracejado girando -->
    <circle class="ring-dash" cx="50" cy="52" r="28" stroke="rgba(200,241,53,0.25)" stroke-width="1.5" stroke-dasharray="5 3"/>
    <!-- corpo -->
    <circle cx="50" cy="52" r="36" fill="#1C1F38" stroke="#C8F135" stroke-width="2.5"/>
    <!-- olhos -->
    <ellipse class="eye" cx="40" cy="48" rx="5" ry="6" fill="#C8F135"/>
    <ellipse class="eye" cx="60" cy="48" rx="5" ry="6" fill="#C8F135"/>
    <circle cx="41.5" cy="47" r="2" fill="#0D0F1A"/>
    <circle cx="61.5" cy="47" r="2" fill="#0D0F1A"/>
    <!-- brilhinhos nos olhos -->
    <circle cx="43" cy="45.5" r="1" fill="white" opacity="0.6"/>
    <circle cx="63" cy="45.5" r="1" fill="white" opacity="0.6"/>
    <!-- sorriso -->
    <path d="M40 60 Q50 68 60 60" stroke="#C8F135" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- ponto de origem (topo) -->
    <circle cx="50" cy="16" r="5" fill="#C8F135"/>
    <!-- ponto de destino (base) -->
    <circle cx="50" cy="88" r="5" fill="#6366F1"/>
  </g>
</svg>
